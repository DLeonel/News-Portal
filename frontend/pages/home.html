<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><span class="nameOfSite2"></span>Technology</span>  Blog - Home</title>
    <!-- Importando scripts do Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importando ícones da biblioteca bootstrap-icons-->
        <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <script>
        // Configuração rápida de tema para o Tailwind
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        darkCard: '#151b2c',
                        accentCyan: '#00f2fe',
                        accentPurple: '#9b51e0'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-[#151b2c] border-b-2 border-[#00f2fe] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-2" ><i class=" text-[#00f2fe] text-2xl" id="siteLogo"></i>
                    <span class="text-xl font-bold tracking-wider text-white" class="nameOfSite2"></span>
                </div>
                
                <nav class="hidden md:flex space-x-4">
                    <a href="#" class="text-white border-b-2 border-[#00f2fe] px-3 py-2 text-sm font-medium">Home</a>
                </nav>

                <div class="flex md:hidden">
                    <button type="button" onclick="toggleMobileMenu()" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 focus:outline-none">
                        <i class="bi bi-list text-2xl" id="menu-icon"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="hidden md:hidden bg-[#151b2c] border-t border-gray-800" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="home.html" class="bg-gray-900 text-white block px-3 py-2 rounded-md text-base font-medium" >Home</a>
                <a href="adminPainnel.html" class="text-gray-400 hover:bg-gray-800 hover:text-white block px-3 py-2 rounded-md text-base font-medium" id="pagePeding">Admin</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        
        <div class="border-b border-gray-800 pb-4 mb-8">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i class="bi bi-newspaper text-[#9b51e0]"></i> <span id="subTitleArticlesSection">Artigos Recentes</span> 
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="home-articles-grid">
            
        </div>
    </main>
  <footer class="bg-[#070a12] border-t border-gray-800 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <p class="text-sm text-gray-500">
                &copy; 2026 <span class="text-white font-semibold" class="nameOfSite3"></span> Todos os direitos reservados.
            </p>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-500 hover:text-[#00f2fe] transition text-lg"><i class="bi bi-github"></i></a>
                <a href="#" class="text-gray-500 hover:text-[#00f2fe] transition text-lg"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="text-gray-500 hover:text-[#00f2fe] transition text-lg"><i class="bi bi-twitter-x"></i></a>
            </div>
        </div>
    </footer>

    <script type="module" src="../js/pages/home.js"></script>
</body>
</html>
