<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Blog - Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        darkCard: '#151b2c',
                        accentCyan: '#00f2fe',
                        accentPurple: '#9b51e0'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-[#151b2c] border-b-2 border-[#00f2fe]">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="#" class="flex-shrink-0 flex items-center gap-2">
                    <i class="bi bi-cpu text-[#00f2fe] text-2xl"></i>
                    <span class="text-xl font-bold tracking-wider text-white">TECHNOLOGY</span>
                </a>
                <nav class="space-x-4">
                    <a href="home.html" class="text-gray-400 hover:text-[#00f2fe] transition text-sm font-medium">Home</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-[#151b2c] border border-gray-800 rounded-xl p-8 shadow-2xl relative overflow-hidden">
            
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-[#00f2fe] to-[#9b51e0]"></div>

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gray-800 border border-gray-700 text-[#00f2fe] text-2xl mb-3" id="auth-icon-box">
                    <i class="bi bi-shield-lock" id="auth-icon"></i>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight" id="auth-title">Acesso à Conta</h2>
                <p class="text-sm text-gray-400 mt-1" id="auth-subtitle">Introduza o seu Gmail para entrar no blog</p>
            </div>

            <form id="auth-form" onsubmit="processAuth(event)" class="space-y-5">
                
                <div>
                    <label for="user-gmail" class="block text-sm font-medium text-gray-300 mb-2">Endereço de Gmail</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500">
                            <i class="bi bi-envelope-at text-lg"></i>
                        </div>
                        <input type="email" id="user-gmail" required autocomplete="email"
                            class="block w-full pl-10 pr-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-[#00f2fe] focus:ring-1 focus:ring-[#00f2fe] transition text-sm"
                            placeholder="exemplo@gmail.com">
                    </div>
                </div>

                <div class="text-xs text-gray-500 flex items-center gap-1.5 px-1">
                    <i class="bi bi-info-circle text-[#00f2fe]"></i> A validação será feita diretamente via e-mail.
                </div>

                <button type="submit" id="auth-submit-btn"
                    class="w-full bg-gray-800 hover:bg-[#00f2fe] text-white hover:text-black font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-md">
                    <span>Entrar no Sistema</span> <i class="bi bi-box-arrow-in-right"></i>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-800 text-center">
                <button type="button" onclick="toggleAuthMode()" id="auth-toggle-link"
                    class="text-sm text-[#00f2fe] hover:text-[#9b51e0] transition font-medium focus:outline-none">
                    Não tem uma conta? Registar-se aqui
                </button>
            </div>

        </div>
    </main>

    <footer class="bg-[#070a12] border-t border-gray-800 py-6">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <p class="text-sm text-gray-500">
                &copy; 2026 <span class="text-white font-semibold">Technology</span>. Todos os direitos reservados.
            </p>
        </div>
    </footer>

    <script>
        // Configuração do e-mail master do administrador para o teste de colisão
        const ADMIN_GMAIL_MASTER = "admin@gmail.com";
        let isRegisterMode = false;

        // Alterna dinamicamente as classes e textos entre LOGIN e REGISTRO
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('auth-submit-btn');
            const toggleLink = document.getElementById('auth-toggle-link');
            const iconBox = document.getElementById('auth-icon-box');
            const icon = document.getElementById('auth-icon');

            if (isRegisterMode) {
                title.innerText = "Criar Nova Conta";
                subtitle.innerText = "Registe o seu Gmail para começar a ler";
                submitBtn.innerHTML = '<span>Concluir Registro</span> <i class="bi bi-person-plus"></i>';
                toggleLink.innerText = "Já possui cadastro? Fazer Login";
                iconBox.classList.replace('text-[#00f2fe]', 'text-[#9b51e0]');
                icon.classList.replace('bi-shield-lock', 'bi-person-badge');
            } else {
                title.innerText = "Acesso à Conta";
                subtitle.innerText = "Introduza o seu Gmail para entrar no blog";
                submitBtn.innerHTML = '<span>Entrar no Sistema</span> <i class="bi bi-box-arrow-in-right"></i>';
                toggleLink.innerText = "Não tem uma conta? Registar-se aqui";
                iconBox.classList.replace('text-[#9b51e0]', 'text-[#00f2fe]');
                icon.classList.replace('bi-person-badge', 'bi-shield-lock');
            }
        }

        // Lógica de simulação de submissão (Preparada para capturar os IDs e enviar para as tabelas)
        function processAuth(event) {
            event.preventDefault();
            const gmailValue = document.getElementById('user-gmail').value.trim().toLowerCase();

            if (gmailValue === ADMIN_GMAIL_MASTER) {
                alert("Sucesso: Gmail de Administrador detetado! Redirecionando para o Painel Administrativo...");
                // Aqui você fará a chamada de rota do backend para renderizar a página do painel
            } else {
                if (isRegisterMode) {
                    alert(`Registro efetuado com sucesso para: ${gmailValue}! Redirecionando para a Home de leitura.`);
                    history('home')
                } else {
                    alert(`Login efetuado! Bem-vindo de volta. Redirecionando para a Home.`);
                }
                // Redirecionamento padrão do usuário comum para a área de leitura
            }
        }
    </script>
</body>
</html>
